name: Actualizacion Lunes 9am

on:
  schedule:
    - cron: '0 15 * * 1'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Descargar codigo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 2. Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Instalar librerias
        run: |
          pip install --upgrade yfinance pandas curl_cffi

      - name: 4. Sincronizar con Santiago (Paso Clave)
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          # Esto baja tus ultimos cambios antes de que el robot empiece a trabajar
          git pull origin main --rebase

      - name: 5. Ejecutar el Robot Recolector
        run: python harvester.py

      - name: 6. Guardar y Empujar (Con fuerza)
        run: |
          git add logit_data.csv
          # Solo guardamos si realmente hay datos nuevos
          if git diff --staged --quiet; then
            echo "No hay cambios."
          else
            git commit -m "Actualizacion automatica: Datos Logit"
            # Volvemos a jalar por si Santiago cambio algo en estos 15 minutos
            git pull --rebase origin main
            git push origin main
          fi
